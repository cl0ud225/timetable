<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이동수업 시간표</title>

<style>
:root {
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #111;
  --primary: #4a6cff;
}

.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #f5f5f5;
  --primary: #7c96ff;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  padding: 20px;
  transition: 0.3s;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  margin: 5px;
}

#result {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.set {
  font-size: 20px;
  font-weight: bold;
  color: var(--primary);
  margin-bottom: 8px;
}
</style>
</head>

<body>

<h1> 이동수업 시간표</h1>

<input type="text" id="studentId" placeholder="학번 입력">
<button onclick="showTimetable()">조회</button>
<button onclick="toggleDark()">🌙</button>

<div id="result"></div>

<script>
const data = {
  "3524": {
    "A": ["영어 독해와 작문", "3반"],
    "B": ["화법과 작문", "2반"],
    "C": ["미적분", "1반"],
    "D": ["생명과학2", "4반"],
    "E": ["사회문화", "3반"],
    "F": ["물리학2", "2반"],
    "G": ["체육/정보/환경", "체육관"],
    "H": ["인공지능수학", "1반"]
  },
  "3517": {
    "A": ["미적분", "1반"],
    "B": ["기하", "2반"],
    "C": ["화학2", "3반"],
    "D": ["화법과 작문", "4반"],
    "E": ["생명과학2", "1반"],
    "F": ["물리학2", "2반"],
    "G": ["체육/정보/환경", "체육관"],
    "H": ["인공지능수학", "3반"]
  }
};

function showTimetable() {
  const studentId = document.getElementById("studentId").value;
  const result = document.getElementById("result");
  result.innerHTML = "";

  if (data[studentId]) {

    // 학번 저장
    localStorage.setItem("savedId", studentId);

    for (let set in data[studentId]) {
      const subject = data[studentId][set][0];
      const classroom = data[studentId][set][1];

      result.innerHTML += `
        <div class="card">
          <div class="set">${set}</div>
          <div>${subject} | ${classroom}</div>
        </div>
      `;
    }
  } else {
    result.innerHTML = "❌ 학번을 찾을 수 없습니다.";
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

// 다크모드 유지
if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
}

// 저장된 학번 자동 입력 + 자동 조회
const savedId = localStorage.getItem("savedId");
if (savedId) {
  document.getElementById("studentId").value = savedId;
  showTimetable();
}
</script>

</body>
</html>
