<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이동수업 시간표</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  text-align: center;
  padding: 20px;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 95%;
  max-width: 900px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 13px;
}

th {
  background: #4a6cff;
  color: white;
}

.period {
  background: #eee;
  font-weight: bold;
}

td {
  background: #fff;
}

.set {
  font-weight: bold;
  font-size: 15px;
  color: #4a6cff;
  display: block;
  margin-bottom: 4px;
}

input, button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  background: #4a6cff;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h2>📚 이동수업 시간표</h2>

<input type="text" id="studentId" placeholder="학번 입력">
<button onclick="generate()">조회</button>

<div id="tableArea"></div>

<script>

// 주간 세트표
const weekly = [
  ["자율","B","E","B","G"],
  ["D","G","D","G","C"],
  ["F","A","B","H","D"],
  ["E","D","F","E","B"],
  ["G","F","C","C","E"],
  ["C","진로","A","F","A"],
  ["","동아리","","A",""]
];

const days = ["월","화","수","목","금"];

// 체육/정보/환경 요일별 매핑
const peMapping = {
  A: { 화:["골프","허범*"], 수:["환경","오이*"], 목:["정보","홍*"], 금:["정보","홍*"] },
  B: { 화:["환경","오이*"], 수:["정보","홍*"], 목:["골프","허범*"], 금:["정보","홍*"] },
  C: { 월:["정보","홍*"], 수:["환경","오이*"], 목:["골프","허범*"], 금:["정보","홍*"] },
  D: { 월:["정보","홍*"], 화:["환경","오이*"], 수:["정보","홍*"], 금:["골프","허범*"] },
  E: { 월:["정보","홍*"], 수:["환경","오이*"], 목:["정보","홍*"], 금:["골프","허범*"] },
  F: { 월:["골프","허범*"], 화:["환경","오이*"], 수:["정보","홍*"], 목:["정보","홍*"] },
  G: { 월:["정보","홍*"], 화:["골프","허범*"], 목:["환경","오이*"], 금:["정보","홍*"] }
};

const students = {
  "3201": {
    A:["영어 독해와 작문","3반","최용*"],
    B:["체육/정보/환경","3층 C실",""],
    C:["경제","4반","배수*"],
    D:["화법과 작문","2반","최서*"],
    E:["사회문화","3반","이지*"],
    F:["영어권 문화","3반","안재*"],
    G:["생활과과학","6반","김기*"],
    H:["보건","3반","김소*"]
  },
  "3202": {
    A:["화법과 작문","1반","최서*"],
    B:["미적분","1반","민병*"],
    C:["경제","4반","배수*"],
    D:["사회문화","3층 B실","정아*"],
    E:["체육/정보/환경","4반",""],
    F:["영어 독해와 작문","4반","최용*"],
    G:["사회문제탐구","3반","오예*"],
    H:["논술","1반","김기*"]
  },
  "3300": {
    A:["영어 독해와 작문","3반","최용*"],
    B:["화학2","5반","이래*"],
    C:["미적분","3반","김나*"],
    D:["생명과학2","과학실","송미*"],
    E:["사회문제탐구","5반","오예*"],
    F:["언어와 매체","3층 B실","김예*"],
    G:["체육/정보/환경","3층 B실",""],
    H:["보건","4반","문현*"]
  },
  "3512": {
    A:["미적분","2반","민병*"],
    B:["체육/정보/환경","3층 C실",""],
    C:["경제","4반","배수*"],
    D:["사회문화","3층 B실","정아*"],
    E:["영어회화","1반","임희*"],
    F:["화법과 작문","5반","최서*"],
    G:["사회문제탐구","3반","오예*"],
    H:["논술","도서실","정아*"]
  },
  "3517": {
    A:["미적분","2반","민병*"],
    B:["기하","2반","박종*"],
    C:["화학2","3층 B실","이래*"],
    D:["화법과 작문","2반","최서*"],
    E:["생명과학2","3층 B실","송미*"],
    F:["물리학2","6반","김영*"],
    G:["체육/정보/환경","3층 B실",""],
    H:["인공지능수학","수학실","김진*"]
  },
  "3524": {
    A:["영어 독해와 작문","3반","최용*"],
    B:["화법과 작문","3반","최서*"],
    C:["미적분","3반","김나*"],
    D:["생명과학2","과학실","송미*"],
    E:["사회문화","3반","이지*"],
    F:["물리학2","6반","김영*"],
    G:["체육/정보/환경","3층 B실",""],
    H:["인공지능수학","수학실","김진*"]
  },
  "3619": {
    A:["체육/정보/환경","5반",""],
    B:["지구과학","6반","김기*"],
    C:["사회문화","5반","정아*"],
    D:["기하","3층 C실","민병*"],
    E:["화법과 작문","6반","최서*"],
    F:["물리학2","6반","김영*"],
    G:["미적분","4반","김나*"],
    H:["인공지능수학","수학실","김진*"]
  },
  "3627": {
    A:["사회문제탐구","4반","정근*"],
    B:["화법과 작문","3반","최서*"],
    C:["영어 독해와 작문","2반","최용*"],
    D:["세계사","5반","정근*"],
    E:["사회문화","3반","이지*"],
    F:["한국지리","지리실","진성*"],
    G:["체육/정보/환경","3층 B실",""],
    H:["논술","1반","김기*"]
  }
};

function generate() {
  const id = document.getElementById("studentId").value;
  const area = document.getElementById("tableArea");

  if (!students[id]) {
    area.innerHTML = "❌ 학번을 찾을 수 없습니다.";
    return;
  }

  let html = "<table>";
  html += "<tr><th>교시</th>";
  days.forEach(d => html += `<th>${d}</th>`);
  html += "</tr>";

  weekly.forEach((row, i) => {
    html += `<tr><td class="period">${i+1}교시</td>`;

    row.forEach((cell, colIndex) => {

      if (students[id][cell]) {

        let subject = students[id][cell][0];
        let room = students[id][cell][1];
        let teacher = students[id][cell][2];

        const dayName = days[colIndex];

        // 체육/정보/환경이면 요일별 변경
        if (subject === "체육/정보/환경" && peMapping[cell] && peMapping[cell][dayName]) {
          subject = peMapping[cell][dayName][0];
          teacher = peMapping[cell][dayName][1];
        }

        html += `
          <td>
            <span class="set">${cell}</span>
            ${subject} | ${room} | ${teacher}
          </td>
        `;
      } else {
        html += `<td>${cell}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";
  area.innerHTML = html;
}
</script>

</body>
</html>
