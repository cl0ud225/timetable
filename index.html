<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이동수업 시간표</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  text-align: center;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 14px;
}

th {
  background: #4a6cff;
  color: white;
}

.period {
  background: #eee;
  font-weight: bold;
}

input, button {
  padding: 8px;
  font-size: 16px;
  margin: 5px;
}

.container {
  overflow-x: auto;
}
</style>
</head>

<body>

<h2>📚 이동수업 시간표</h2>

<input type="text" id="studentId" placeholder="학번 입력">
<button onclick="generate()">조회</button>

<div class="container">
<table id="timetable"></table>
</div>

<script>

// 세트 시간표 구조
const weekly = [
  ["자율", "B", "E", "B", "G"],
  ["D", "G", "D", "G", "C"],
  ["F", "A", "B", "H", "D"],
  ["E", "D", "F", "E", "B"],
  ["G", "F", "C", "C", "E"],
  ["C", "진로", "A", "F", "A"],
  ["", "동아리", "", "A", ""]
];

const days = ["월", "화", "수", "목", "금"];

const students = {

  "3524": {
    A: ["영어 독해와 작문", "3반"],
    B: ["화법과 작문", "2반"],
    C: ["미적분", "1반"],
    D: ["생명과학2", "4반"],
    E: ["사회문화", "3반"],
    F: ["물리학2", "2반"],
    G: ["체육/정보/환경", "체육관"],
    H: ["인공지능수학", "1반"]
  },

  "3517": {
    A: ["미적분", "1반"],
    B: ["기하", "2반"],
    C: ["화학2", "3반"],
    D: ["화법과 작문", "4반"],
    E: ["생명과학2", "1반"],
    F: ["물리학2", "2반"],
    G: ["체육/정보/환경", "체육관"],
    H: ["인공지능수학", "3반"]
  }

};

function generate() {

  const id = document.getElementById("studentId").value;
  const table = document.getElementById("timetable");
  table.innerHTML = "";

  if (!students[id]) {
    table.innerHTML = "<tr><td>❌ 학번을 찾을 수 없습니다.</td></tr>";
    return;
  }

  let header = "<tr><th>교시</th>";
  days.forEach(day => header += `<th>${day}</th>`);
  header += "</tr>";
  table.innerHTML += header;

  weekly.forEach((row, i) => {
    let line = `<tr><td class="period">${i+1}교시</td>`;

    row.forEach(cell => {
      if (students[id][cell]) {
        const subject = students[id][cell][0];
        const room = students[id][cell][1];
        line += `<td>${subject}<br><small>${room}</small></td>`;
      } else {
        line += `<td>${cell}</td>`;
      }
    });

    line += "</tr>";
    table.innerHTML += line;
  });
}

</script>

</body>
</html>
